services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sutra_erp}
    volumes:
      - sutra_postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/sutra_erp?schema=public}
      PORT: 4000
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_in_prod_please_min_16_chars}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORTAL_ACCESS_KEY: ${PORTAL_ACCESS_KEY:-}
      UPI_VPA: ${UPI_VPA:-}
      UPI_PAYEE_NAME: ${UPI_PAYEE_NAME:-}
      STITCHING_SERVICE_PRODUCT_CODE: ${STITCHING_SERVICE_PRODUCT_CODE:-}
      STITCHING_TAILOR_EXPENSE_ACCOUNT_CODE: ${STITCHING_TAILOR_EXPENSE_ACCOUNT_CODE:-}
    ports:
      - "4000:4000"
    volumes:
      - sutra_storage:/app/storage

  pos:
    build:
      context: ./pos
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  sutra_postgres_data:
  sutra_storage:
