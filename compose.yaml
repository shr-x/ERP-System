services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sutra_erp}
    volumes:
      - sutra_postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/sutra_erp?schema=public}
      PORT: 4000
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-Adue6P]b.]cMpLQSECdgXB;O/{,Z+07(>{@aa/vptVL5C@ETwaTPhR9/Oik5>qxYK.nIZ@%u_JNwuV.*GNmnpf}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORTAL_ACCESS_KEY: ${PORTAL_ACCESS_KEY:-ziaRU3SaWVt49o5eTTwOqRWaYeQ2vWUuZe8THBWqIpjJivJcUV7G0K6YH6fE6OwMlCNyqguF3As2owxlH5gNSi}
      UPI_VPA: ${UPI_VPA:-sutra@upi}
      UPI_PAYEE_NAME: ${UPI_PAYEE_NAME:-Sutra_Collections}
      STITCHING_SERVICE_PRODUCT_CODE: ${STITCHING_SERVICE_PRODUCT_CODE:-STITCH-SVC}
      STITCHING_TAILOR_EXPENSE_ACCOUNT_CODE: ${STITCHING_TAILOR_EXPENSE_ACCOUNT_CODE:-EXPENSE_TAILORING}
    ports:
      - "4000:4000"
    volumes:
      - sutra_storage:/app/storage

  pos:
    build:
      context: ./pos
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run sutra
    volumes:
      - 'C:\Users\spart\.cloudflared:/etc/cloudflared:ro'
    depends_on:
      - pos
      - backend

volumes:
  sutra_postgres_data:
  sutra_storage:
