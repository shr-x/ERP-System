services:
  postgres:
    image: postgres:16
    container_name: sutra-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sutra_erp
    ports:
      - "5433:5432"
    volumes:
      - sutra_postgres_data:/var/lib/postgresql/data

volumes:
  sutra_postgres_data:
